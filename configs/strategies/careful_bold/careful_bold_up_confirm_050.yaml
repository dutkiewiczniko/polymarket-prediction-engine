name: careful_bold_up_confirm_050
type: rule_based
order_usd: 1

params:
  default_usd_amount: 1
  max_orders: 300
  cooldown_ticks: 1

  rules:
    - name: take_profit_up_position
      all:
        - metric: has_up_position
          operator: "is"
          value: true
        - metric: up_price
          operator: ">="
          value: 0.95
      action: sell_up

    - name: take_profit_down_position
      all:
        - metric: has_down_position
          operator: "is"
          value: true
        - metric: down_price
          operator: ">="
          value: 0.95
      action: sell_down

    - name: cheap_up_001_buy_50_tokens
      all:
        - metric: up_price
          operator: "<="
          value: 0.01
      action: buy_up
      token_amount: 50

    - name: cheap_down_001_buy_50_tokens
      all:
        - metric: down_price
          operator: "<="
          value: 0.01
      action: buy_down
      token_amount: 50

